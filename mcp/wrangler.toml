# Cloudflare Workers config for yananer-mcp.
# Deploy: npm run deploy   (needs `wrangler login` once)
name = "yananer-mcp"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Serve the MCP agent from a Durable Object. SQLite-backed classes are
# included on the Workers **free** plan.
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "YananerMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["YananerMCP"]

# Abuse backstop: 60 requests / 60s per client IP (matches the old
# express-rate-limit). Free, counts per Cloudflare colo. `period` must be 10 or 60.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Public hostname.
#
# Custom domain → https://mcp.yananer.dev/mcp
# NOTE: wrangler 4.107 silently ignored this custom_domain route on deploy, so
# the domain was attached once via the Workers Domains API (equivalent to
# dashboard: Worker → Settings → Domains & Routes → Add Custom Domain). It
# persists account-side; this entry is kept as the declared intent. If a future
# `wrangler deploy` errors that the domain already exists, remove this line.
routes = [{ pattern = "mcp.yananer.dev", custom_domain = true }]

[observability]
enabled = true

# `agents` lazily imports the optional `ai` SDK in a client-only code path this
# server Worker never runs. Alias it to a tiny stub so the bundler resolves it
# without pulling the full SDK into the bundle.
[alias]
ai = "./ai-stub.js"
