# Cloudflare Workers config for yananer-mcp.
# Deploy: npm run deploy   (needs `wrangler login` once)
name = "yananer-mcp"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Serve the MCP agent from a Durable Object. SQLite-backed classes are
# included on the Workers **free** plan.
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "YananerMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["YananerMCP"]

# Abuse backstop: 60 requests / 60s per client IP (matches the old
# express-rate-limit). Free, counts per Cloudflare colo. `period` must be 10 or 60.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

# Public hostname.
#
# Phase 1 (now): no custom domain — the Worker is served at
# https://yananer-mcp.<your-subdomain>.workers.dev/mcp for free, with no DNS
# changes. This is the default while the line below stays commented.
#
# Phase 2 (once yananer.dev's nameservers are on this Cloudflare account):
# uncomment the line below and re-run `npm run deploy`. Wrangler then creates
# the DNS record + custom domain automatically → https://mcp.yananer.dev/mcp
# routes = [{ pattern = "mcp.yananer.dev", custom_domain = true }]

[observability]
enabled = true
